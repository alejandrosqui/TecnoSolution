name: tecnosolution

networks:
  tecnosolution_network:
    driver: bridge

volumes:
  tecnosolution_pgdata:
  tecnosolution_minio_data:

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tecnosolution}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
      POSTGRES_DB: ${POSTGRES_DB:-tecnosolution_db}
    ports:
      - "5433:5432"
    volumes:
      - tecnosolution_pgdata:/var/lib/postgresql/data
    networks:
      - tecnosolution_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tecnosolution} -d ${POSTGRES_DB:-tecnosolution_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    networks:
      - tecnosolution_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio_secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - tecnosolution_minio_data:/data
    networks:
      - tecnosolution_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8004:8001"
    env_file:
      - .env
    # Override URLs to use internal Docker service names (not host-mapped ports)
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tecnosolution}:${POSTGRES_PASSWORD:-secret}@postgres:5432/${POSTGRES_DB:-tecnosolution_db}
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - tecnosolution_network
